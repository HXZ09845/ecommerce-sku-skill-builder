name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate release package
        run: python3 scripts/validate_release.py
      - name: Check installer dry run
        run: python3 scripts/install_codex_skill.py --dry-run
      - name: Validate real-run case output
        run: python3 case-studies/real-run-a6-office-tea-bar/office-tea-bar-overtime-sku/scripts/validate_case.py
      - name: Validate prompt-plan evals
        run: python3 scripts/prompt_plan_check.py --evals evals/prompt-plan-evals.json
      - name: Validate source registry
        run: python3 scripts/source_registry_check.py
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile Python files
        run: python3 -m compileall scripts tests skills/sku-skill-builder/scripts skills/sku-skill-builder/references case-studies/real-run-a6-office-tea-bar/office-tea-bar-overtime-sku/scripts
      - name: Check diff whitespace
        run: git diff --check
